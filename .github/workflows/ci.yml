name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[service,dev]"
      - name: Lint
        run: ruff check ghic tests conftest.py
      - name: Test
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      # The image needs a model artifact; CI builds with a placeholder so the
      # Dockerfile itself stays verified. Real deploys copy a trained model.
      - name: Placeholder model
        run: mkdir -p models && touch models/rf_balanced.joblib
      - name: Build image
        run: docker build -t ghic:ci .
